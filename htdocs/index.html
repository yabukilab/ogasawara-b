<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千葉工大生に向けた娯楽施設</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #ff7f50; /* 背景色をコーラルカラーに設定 */
      color: #fff; /* テキスト色を白に設定 */
      text-align: center;
    }
    header {
      background: #ff7f50; /* 暖色系のコーラルカラー */
      color: #fff;
      padding: 20px 10px;
      text-align: center;
    }
    main {
      margin: 20px auto;
      max-width: 600px;
      padding: 0 10px; /* スマホでの左右余白を追加 */
    }
    a {
      display: inline-block;
      margin: 10px;
      padding: 15px 30px;
      background-color: #fff; /* ボタン背景を白に */
      color: #ff7f50; /* ボタン文字色をコーラルに */
      text-decoration: none;
      border-radius: 5px;
      font-size: 1.2em;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease;
    }
    a:hover {
      background-color: #ffe4c4; /* ホバー時の背景色を薄いベージュに */
    }
    /* メディアクエリで画面幅に応じたスタイル調整 */
    @media (max-width: 600px) {
      a {
        display: block; /* ボタンを縦に並べる */
        width: calc(100% - 40px); /* ボタン幅を調整（左右の余白） */
        margin: 10px auto; /* センター揃え */
        padding: 15px 20px; /* 余白を調整 */
        font-size: 1em; /* フォントサイズを少し縮小 */
      }
      main {
        padding: 0 20px; /* スマホで左右余白を広めに確保 */
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>千葉工大生に向けた娯楽施設</h1>
  </header>
  <main>
    <p>千葉工業大学周辺の
      おすすめ娯楽施設を紹介します！</p>
    <a href="サウナ.html">温泉・サウナ施設</a>
    <a href="スポーツジム.html">スポーツジム</a>
    <a href="娯楽施設.html">レジャー施設</a>
  </main>
</body>
</html>
