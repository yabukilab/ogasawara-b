<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千葉工業大学周辺のスポーツジム</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }
    header {
      background: #ff7f50; /* 暖色系のコーラルカラー */
      color: #fff;
      padding: 10px 20px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    .gym {
      margin-bottom: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .gym h2 {
      margin-top: 0;
      color: #333;
    }
    .gym a {
      color: #1e90ff;
      text-decoration: none;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
      margin-top: 10px;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .recommendation {
      font-weight: bold;
      color: #444;
      margin-top: 10px;
    }
    /* スマートフォン向け */
    @media (max-width: 768px) {
      header {
        font-size: 18px;
      }
      .gym {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>千葉工業大学周辺のスポーツジム</h1>
</header>

<main>
  <!-- ゴールドジム -->
  <section class="gym">
    <h2>ゴールドジム 津田沼千葉</h2>
    <img src="ゴールドジム.jpg" alt="ゴールドジム津田沼千葉の写真" width="700" height="500">
    <p><strong>場所:</strong> 千葉県船橋市前原西2-21-1 津田沼駅前ビル 5F</p>
    <p><strong>ホームページ:</strong> 
      <a href="https://www.goldsgym.jp/shop/12200" target="_blank">公式サイトはこちら</a>
    </p>
    <p class="recommendation">おすすめポイント: 充実したマシン設備と専門的なトレーナーによる指導が魅力。</p>
    <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d25926.047695307614!2d139.99141951562495!3d35.6830105!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6022802c04f86bdd%3A0x28a304d5d2770da1!2z44K044O844Or44OJ44K444OgIOa0peeUsOayvOWNg-iRiQ!5e0!3m2!1sja!2sjp!4v1733465298769!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"
      allowfullscreen>
    </iframe>
  </section>

  <!-- エニタイムフィットネス -->
  <section class="gym">
    <h2>エニタイムフィットネス 津田沼</h2>
    <img src="エニタイム.jpg" alt="エニタイムフィットネス津田沼の写真" width="700" height="500">
    <p><strong>場所:</strong> 千葉県習志野市谷津7-7-1 Loharu津田沼 3F</p>
    <p><strong>ホームページ:</strong> 
      <a href="https://www.anytimefitness.co.jp/tsudanuma/" target="_blank">公式サイトはこちら</a>
    </p>
    <p class="recommendation">おすすめポイント: 清潔感あふれる施設で、初心者でも利用しやすい雰囲気。</p>
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d25926.026181094003!2d139.9914195040453!3d35.6830767082927!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60187f8a1bc4030f%3A0x7edb45a367ff7ba2!2z44Ko44OL44K_44Kk44Og44OV44Kj44OD44OI44ON44K5IOa0peeUsOayvOW6lw!5e0!3m2!1sja!2sjp!4v1733465619111!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      allowfullscreen>
    </iframe>
  </section>
</main>

</body>
</html>
