<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>morisia</title>
   
    <!-- 外部CSSファイルのリンク -->
     <link rel="stylesheet" href="morisia.css">

     <!-- Rounded M+ 1cのリンク -->
     <link href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>morisia紹介</h1>

        <div class="main-image">
            <img src="deta/モリシアmein.jpg" alt="morisiaの写真">
        </div>

        <div class="container">
            <h2>店舗と施設</h2>
            
            <figure>
                <img src="deta/アニメイト.jpg" alt="Animate Store Image" style="width: 600px; height: auto;">
                <figcaption>アニメイト
                    子供たちに人気なガシャポンがいっぱい
                </figcaption>
            </figure>
            
            <figure>
                <img src="deta/ゲームセンター.jpg" alt="Game Arcade Image" style="width: 600px; height: auto;">
                <figcaption>ゲームセンター
                    広く多彩なゲーム機種があり、人気コーナー
                </figcaption>
            </figure>
            
            <figure>
                <img src="deta/フードコート.jpg" alt="Food Court Image" style="width: 600px; height: auto;">
                <figcaption>フードコート
                    子供たちに人気なチェーン店が混在
                </figcaption>
            </figure>
           
            <figure>
                <img src="deta/モリシアエスカレーター.jpg" alt="Food Image" style="width: 600px; height: auto;">
                <figcaption>
                    皆大好きなマクドナルドやサンマルクカフェ
                </figcaption>
            </figure>
        </div>
        
    </div>

    <footer>
        <p>※こちらは千葉工業大学PM学科のPM実験用のサイトです。</p>
